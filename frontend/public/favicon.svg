<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#bg)" />
  <!-- Calendar top bar -->
  <path d="M 25 35 Q 25 25 35 25 L 65 25 Q 75 25 75 35 Z" fill="rgba(255,255,255,0.2)" />
  <!-- Calendar body -->
  <path d="M 25 35 L 75 35 L 75 65 Q 75 75 65 75 L 35 75 Q 25 75 25 65 Z" fill="white" />
  <!-- Calendar binders -->
  <rect x="35" y="20" width="6" height="12" rx="3" fill="#E2E8F0" />
  <rect x="59" y="20" width="6" height="12" rx="3" fill="#E2E8F0" />
  <!-- Clock face inside calendar -->
  <circle cx="50" cy="55" r="12" fill="#F8FAFC" stroke="#4F46E5" stroke-width="3" />
  <!-- Clock hands -->
  <path d="M 50 55 L 50 48 M 50 55 L 56 55" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round" />
</svg>
